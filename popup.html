<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 2134 1512" width="28" height="20">
      <path fill="#f5f5f5" d="m1313.21,5.89l217.33,367.92c2.19,3.71,6.2,5.96,10.5,5.89l581.1-8.54c12.22-.18,16.85,15.88,6.41,22.24l-421.75,256.76c-5.59,3.4-7.42,10.66-4.11,16.3l282.67,483.02c5.71,9.76-4.01,21.27-14.59,17.28l-681.39-257.37c-3.45-1.3-7.32-.95-10.47.97l-986.7,599.93c-11.03,6.71-23.42-6.36-16.13-17.02l516.47-755.48c4.38-6.41,1.61-15.23-5.65-17.99L7.76,424.75c-12.38-4.69-9.16-23.02,4.08-23.21l1015.12-14.41c3.91-.06,7.55-2.01,9.75-5.25L1292.97,5.25c4.95-7.27,15.77-6.92,20.24.65Z"/>
    </svg>
    <div class="brand">
      <span class="name">hoshi unlocker</span>
      <span class="version">v1.0.0</span>
    </div>
    <a class="dev-link" id="dev-link" data-i18n="dev">dev</a>
  </div>
  <div class="status-row">
    <span class="status-dot" id="status-dot"></span>
    <span class="status-text" id="status-text">---</span>
  </div>
  <div class="count" id="domain-count"></div>
</div>

<div class="card dev-panel" id="dev-panel" style="display:none">
  <nav class="tabs">
    <button class="tab active" data-tab="cors" data-i18n="tabs.cors">CORS</button>
    <button class="tab" data-tab="origin" data-i18n="tabs.origin">O/R</button>
    <button class="tab" data-tab="headers" data-i18n="tabs.headers">HDR</button>
    <button class="tab" data-tab="legal" data-i18n="tabs.legal">Legal</button>
  </nav>

  <div class="content">
    <section id="tab-cors" class="tab-content active">
      <p class="hint" data-i18n="cors.hint">Add Access-Control-Allow-* response headers</p>
      <div class="add-row">
        <input id="cors-input" type="text" data-i18n-placeholder="cors.placeholder" placeholder="e.g. cdn.example.com" autocomplete="off">
        <button id="cors-add" class="btn-primary" data-i18n="cors.add">Add</button>
      </div>
      <div id="cors-list" class="list"></div>
    </section>
    <section id="tab-origin" class="tab-content">
      <p class="hint" data-i18n="origin.hint">Override Origin and Referer per domain</p>
      <div class="form-grid">
        <input id="or-domain" type="text" data-i18n-placeholder="origin.domain" placeholder="Domain" autocomplete="off">
        <input id="or-origin" type="text" data-i18n-placeholder="origin.originPlaceholder" placeholder="Origin" autocomplete="off">
        <input id="or-referer" type="text" data-i18n-placeholder="origin.refererPlaceholder" placeholder="Referer" autocomplete="off">
        <button id="or-add" class="btn-primary" data-i18n="origin.add">Add</button>
      </div>
      <div id="origin-list" class="list"></div>
    </section>
    <section id="tab-headers" class="tab-content">
      <p class="hint" data-i18n="headers.hint">Inject custom headers</p>
      <div class="form-grid">
        <input id="hdr-name" type="text" data-i18n-placeholder="headers.name" placeholder="Name" autocomplete="off">
        <input id="hdr-value" type="text" data-i18n-placeholder="headers.value" placeholder="Value" autocomplete="off">
        <input id="hdr-filter" type="text" data-i18n-placeholder="headers.filter" placeholder="URL filter (*)" autocomplete="off">
        <button id="hdr-add" class="btn-primary" data-i18n="headers.add">Add</button>
      </div>
      <div id="headers-list" class="list"></div>
    </section>
    <section id="tab-legal" class="tab-content">
      <div class="legal-text">
        <h3 data-i18n="legal.title">Legal Disclaimer</h3>
        <p data-i18n="legal.p1">Development and internal testing utility.</p>
        <p data-i18n="legal.p2">Must not be used to circumvent access controls.</p>
        <p data-i18n="legal.p3">Provided "as is," without warranty.</p>
      </div>
    </section>
  </div>

  <div class="status-bar">
    <span id="save-status" data-i18n="status.ready">Ready</span>
    <button class="btn-close" id="btn-close">close dev</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
